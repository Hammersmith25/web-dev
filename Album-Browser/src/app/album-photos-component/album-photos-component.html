<div class="main">
  <button [routerLink]="['/Albums', albumId]">Back</button>

  @if (photos$ | async; as photos) {
    <div class="grid">
      @for (photo of photos; track photo.id) {
        <div class="card">
          <img [src]="photo.thumbnailUrl" [alt]="photo.title" [title]="photo.title" />
          <p class="title">{{ photo.title }}</p>
        </div>
      }
    </div>
  }
</div>
